# IKA Nav2 yapilandirmasi.
# Buyuklukler robot_params.yaml ile uyumlu olmalidir.
# Encoder yok: hizlar dusuk tutuldu (max_vel_x: 0.25).

amcl:
  ros__parameters:
    use_sim_time: false
    # AMCL kullanilmayacak (SLAM Toolbox localization modu tercih edilecek).

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    # ROS 2 Jazzy: 'navigators' parametresi + her navigator icin plugin
    # mapping ZORUNLU. Eksikse bt_navigator configure asamasinda crash eder.
    navigators: ['navigate_to_pose', 'navigate_through_poses']
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    # Jazzy'de BT action/condition node'lari ayni satirla yuklenir (eski
    # plugin_lib_names listesi artik gereksiz — auto-loaded). Custom plugin
    # gerekirse 'plugin_lib_names' geri eklenir.

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    odom_topic: /odometry/filtered
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: true

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.25
      max_vel_y: 0.0
      max_vel_theta: 0.8
      min_speed_xy: 0.0
      max_speed_xy: 0.25
      min_speed_theta: 0.0
      acc_lim_x: 1.5
      acc_lim_y: 0.0
      acc_lim_theta: 2.0
      decel_lim_x: -1.5
      decel_lim_y: 0.0
      decel_lim_theta: -2.0
      vx_samples: 15
      vy_samples: 1
      vtheta_samples: 20
      sim_time: 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics:
        - "RotateToGoal"
        - "Oscillation"
        - "BaseObstacle"
        - "GoalAlign"
        - "PathAlign"
        - "PathDist"
        - "GoalDist"
      PathAlign.scale: 32.0
      PathDist.scale: 32.0
      GoalAlign.scale: 24.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.8
    min_rotational_vel: 0.2
    rotational_acc_lim: 2.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.25
      resolution: 0.05
      # rolling_window: true -> costmap robot etrafinda 20m'lik pencere,
      # slam haritasi ufku otesine de plan yapabilir. slam_toolbox haritasi
      # static_layer'a yine yansir, ama costmap boyutu bilinmeyen alana da uzanir.
      rolling_window: true
      width: 20
      height: 20
      # track_unknown_space: false -> bilinmeyen hucreleri FREE say.
      track_unknown_space: false
      plugins: ["static_layer", "obstacle_layer", "terrain_layer", "detection_layer", "inflation_layer"]
      # Keepout filter shu an kullanilmiyor (maps/keepout_mask.* dosyalari yok).
      # 'filters' parametresi tamamen kaldirildi — empty liste planner_server'i
      # InvalidParameterValueException ile CRASH ettiriyordu.
      # Aktive etmek icin (gelecek):
      #   1) ika_navigation/maps/keepout_mask.{yaml,pgm} olusturun
      #   2) asagiya: filters: ["keepout_filter"]
      #   3) costmap_filters_info_server lifecycle node'unu calistirin

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan depth_points
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 6.0
          obstacle_min_range: 0.0
        depth_points:
          topic: /oak/points
          max_obstacle_height: 2.0
          min_obstacle_height: 0.05
          clearing: true
          marking: true
          data_type: "PointCloud2"
          raytrace_max_range: 4.0
          obstacle_max_range: 3.5

      # terrain_layer: ika_terrain node'unun /terrain_obstacles yayinini
      # ikinci bir StaticLayer olarak global costmap'e ekler.
      # NOT: nav2_costmap_2d::CostmapLayer base class - dogrudan
      # kullanilamaz. StaticLayer ile /terrain_obstacles topic'i tuketilir.
      terrain_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: /terrain_obstacles
        map_subscribe_transient_local: false
        subscribe_to_updates: false
        transform_tolerance: 0.5

      # detection_layer: ika_fusion node'unun /detection_obstacles yayinini
      # (DL ile tespit edilen dinamik/statik nesneler) StaticLayer olarak
      # costmap'e ekler - lidarin goremeyecegi (2D scan duzlemi ustundeki)
      # insan govdesi gibi engelleri yakalar. terrain_layer ile ayni kalip.
      detection_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: /detection_obstacles
        map_subscribe_transient_local: false
        subscribe_to_updates: false
        transform_tolerance: 0.5

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.45

      # KeepoutFilter VARSAYILAN OLARAK KAPALI - aktiflestirmek icin
      # KEEPOUT.md rehberini takip edin (mask dosyasi + filter_info_server
      # node'unu launch icine ekleyin, sonra burada enabled: true yapin).
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: false
        filter_info_topic: "/costmap_filter_info"

# Keepout zone icin gereken yardimci node'lar.
# Aktiflestirmek icin: ika_navigation/launch/navigation.launch.py icine
# bu node'lari ekle ve lifecycle_manager_navigation listesine dahil et.
filter_mask_server:
  ros__parameters:
    use_sim_time: false
    frame_id: "map"
    topic_name: "/keepout_filter_mask"
    # Maske dosyasi - kullanici saglar (bkz. KEEPOUT.md)
    yaml_filename: "keepout_mask.yaml"

costmap_filter_info_server:
  ros__parameters:
    use_sim_time: false
    type: 0                       # 0 = KeepoutFilter
    filter_info_topic: "/costmap_filter_info"
    mask_topic: "/keepout_filter_mask"
    base: 0.0
    multiplier: 1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      robot_radius: 0.25
      plugins: ["voxel_layer", "terrain_layer", "detection_layer", "inflation_layer"]

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan depth_points
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          obstacle_max_range: 5.5
        depth_points:
          topic: /oak/points
          max_obstacle_height: 2.0
          min_obstacle_height: 0.02
          clearing: true
          marking: true
          data_type: "PointCloud2"
          raytrace_max_range: 3.0
          obstacle_max_range: 2.5

      terrain_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: /terrain_obstacles
        map_subscribe_transient_local: false
        subscribe_to_updates: false
        transform_tolerance: 0.5

      detection_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: /detection_obstacles
        map_subscribe_transient_local: false
        subscribe_to_updates: false
        transform_tolerance: 0.5

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.45

collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: base_link
    odom_frame_id: odom
    cmd_vel_in_topic: /cmd_vel_nav
    cmd_vel_out_topic: /cmd_vel_collision
    state_topic: /collision_monitor_state
    transform_tolerance: 0.5
    source_timeout: 2.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach", "StopZone"]
    FootprintApproach:
      type: polygon
      points: "[[0.30, 0.20], [0.30, -0.20], [-0.20, -0.20], [-0.20, 0.20]]"
      action_type: approach
      min_points: 4
      slowdown_ratio: 0.5
      time_before_collision: 2.0
      simulation_time_step: 0.02
      visualize: true
      polygon_pub_topic: /collision_poly_approach
    StopZone:
      type: circle
      radius: 0.25
      action_type: stop
      min_points: 4
      visualize: true
      polygon_pub_topic: /collision_poly_stop
    observation_sources: ["scan", "depth_pointcloud"]
    scan:
      type: scan
      topic: /scan
    depth_pointcloud:
      type: pointcloud
      topic: /oak/points
      min_height: 0.02
      max_height: 1.5

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 4.0
    attempt_respawn_reconnection: true
    bond_respawn_max_duration: 10.0
    node_names:
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator
      - collision_monitor

lifecycle_manager_ika:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - terrain_perception
      - safety_supervisor
