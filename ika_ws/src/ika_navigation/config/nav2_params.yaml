# IKA Nav2 yapilandirmasi.
# Buyuklukler robot_params.yaml ile uyumlu olmalidir.
# Encoder yok: hizlar dusuk tutuldu (max_vel_x: 0.25).

amcl:
  ros__parameters:
    use_sim_time: false
    # AMCL kullanilmayacak (SLAM Toolbox localization modu tercih edilecek).

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    # NOT: Plucky bt_loop_duration=5 deniyor (200 Hz BT tick) ama bizim setup'da
    # robot 2.58m'de takildi (v15 benchmark). 10 (100 Hz) daha guvenli:
    # v14 sonucu 1/4 SUCCEEDED + 7.56m otonom mesafe.
    # Costmap update_frequency 5 Hz ile uyumsuzluk olabilir; 10 ms tick
    # planner'a stale plan referansi veriyor.
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    # ROS 2 Jazzy: 'navigators' parametresi + her navigator icin plugin
    # mapping ZORUNLU. Eksikse bt_navigator configure asamasinda crash eder.
    navigators: ['navigate_to_pose', 'navigate_through_poses']
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
      # FIX (2026-06-04): default BT = w_replanning_and_recovery.xml
      # Bu BT robot 1 sn duruyorsa Spin (90 deg) + BackUp (0.15m) + Wait (5s)
      # recovery yapar. Engele yaklasinca otomatik sag/sol denemesi.
      default_nav_to_pose_bt_xml: "$(find-pkg-share nav2_bt_navigator)/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
      default_nav_through_poses_bt_xml: "$(find-pkg-share nav2_bt_navigator)/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml"

controller_server:
  ros__parameters:
    use_sim_time: false
    # PORT (articubot_one/plucky): controller_frequency 10 -> 5 Hz.
    # WSL sim time step ile uyum kritik — daha yuksek freq simulasyonu gecersiz
    # tampon biriktirip cmd_vel zincirini bozuyordu (intermittent lifecycle).
    controller_frequency: 5.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    odom_topic: /odometry/filtered
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # FIX (2026-06-04): radius 0.5 -> 0.25 (kucuk hareket sayilsin),
      # time_allowance 10 -> 30s (recovery icin zaman).
      # Robot engel onunde 5 sn duraklayip Spin yaparken progress fail
      # sayilmamali.
      required_movement_radius: 0.25
      movement_time_allowance: 30.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: true

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.25
      max_vel_y: 0.0
      max_vel_theta: 0.8
      min_speed_xy: 0.0
      max_speed_xy: 0.25
      min_speed_theta: 0.0
      acc_lim_x: 1.5
      acc_lim_y: 0.0
      acc_lim_theta: 2.0
      decel_lim_x: -1.5
      decel_lim_y: 0.0
      decel_lim_theta: -2.0
      vx_samples: 20         # 15->20: daha cesitli hiz adaylari
      vy_samples: 1
      # FIX (2026-06-05): vtheta_samples 40 -> 80. Goal merkez-çizgide
      # olunca DWB sapma trajectory'leri yeterince üretmiyor; daha yoğun
      # açı sampling kavisli rotasyonlara izin verir (engelden dolanma).
      vtheta_samples: 80
      # KRITIK FIX (2026-06-04): sim_time 1.5->2.5 saniye. Robot 0.25 m/s'de
      # 2.5s ileride 62.5 cm gorur. Onceki 1.5s = 37.5 cm yetersizdi, engel
      # algilanmadan once carpisma oluyordu.
      sim_time: 2.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 1.0   # FIX: 0.2 -> 1.0 (WSL TF gecikme 300ms goruldu)
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics:
        - "RotateToGoal"
        - "Oscillation"
        - "BaseObstacle"
        - "GoalAlign"
        - "PathAlign"
        - "PathDist"
        - "GoalDist"
      # KRITIK YENIDEN AYAR (2026-06-05): DWB critic agirliklari TERS
      # cevrildi. Onceki orantı (PathAlign 16 + PathDist 16 = 32 vs
      # GoalDist 32 + GoalAlign 24 = 56) robotu goal'e direkt çekiyordu.
      # Engelden dolanan eğri plan üretilse bile DWB "no, goal düz hatta"
      # diyerek geri merkez-çizgiye dönüyordu (Faz 3.0 plan capture'da
      # plan eğri ama robot trial'da y≈0 — tam bu çelişki).
      #
      # Yeni orantı (plan-dominant):
      #   BaseObstacle: 40 (kritik, engelden kaç)
      #   PathDist:     64 (plana SIKI kal) ★ artırıldı 16->64
      #   PathAlign:    64 (yön takibi sıkı) ★ artırıldı 16->64
      #   GoalDist:     16 (goal yakınlığı zayıf çekim) ★ azaltıldı 32->16
      #   GoalAlign:    8  (final orientation zayıf) ★ azaltıldı 24->8
      # Toplam: plan-follow 128 vs goal-pull 24 = ~5:1.
      # Robot artık engeli atlatan eğri plana SIKICA uyar; goal'e ulaşma
      # final yaklaşımda RotateToGoal critic'ten gelir.
      BaseObstacle.scale: 40.0
      PathAlign.scale: 64.0
      PathDist.scale: 64.0
      GoalAlign.scale: 8.0
      GoalDist.scale: 16.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0
      Oscillation.scale: 1.0

planner_server:
  ros__parameters:
    use_sim_time: false
    # FIX (2026-06-04): expected_planner_frequency 5 -> 2 Hz +
    # BT RateController hz=1.0 yerine planner_server'in kendisi cagirilmasi
    # gerek. Engel onunde takilan robot icin replan agresif yapildi.
    expected_planner_frequency: 2.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      # FIX (2026-06-04): use_astar false (Dijkstra) -> TRUE (A*).
      # A* engel etrafindan daha akilli yol planlar (kullanici talebi:
      # "A* falan çalışacaktı"). Dijkstra dusuk maliyet alanlari sevdigi
      # icin engel inflation'i icinden gecmek isteyebiliyordu; A* heuristic
      # ile dogrudan goal'e yon verir + inflation'dan kacar.
      use_astar: true
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.8
    min_rotational_vel: 0.2
    rotational_acc_lim: 2.0

global_costmap:
  global_costmap:
    ros__parameters:
      # KRITIK FIX (2026-06-05): use_sim_time false IDI -> true.
      # SIM'DE /scan sim_time stamp'li gelir, costmap wall_clock'la yorumlasa
      # tum scan'ler "too old" filter'ina takilir, GLOBAL OBSTACLE_LAYER
      # ENGELI HIC GORMEZ. Sonuc: planner duz cizgi path uretir, robot
      # engele dogru gider. (Faz 3.0 plan capture: arc/straight=1.0,
      # min_obs_clearance=0.0 — plan engelin TAM ICINDEN geciyordu.)
      # Pi'de (gercek robot, wall_clock /scan) bu DEGER FALSE OLMALI.
      use_sim_time: true
      # KRITIK FIX (2026-06-05 #2): transform_tolerance default 0.3s'de
      # WSL'de "Message Filter dropping message: ... earlier than all data
      # in transform cache" hatasıyla /scan'ler DROP oluyordu. TF buffer
      # robot_state_publisher+EKF tarafından ileri zamanlı doluyor, /scan
      # bridge gecikmesiyle stamp'i daha eski geliyor. 2.0s tolerans buffer
      # geçmişe bakmaya izin verir.
      transform_tolerance: 2.0
      # KRITIK FIX (2026-06-04): 1.0 Hz update => robot 0.25 m/s'de saniyede
      # 25 cm gidiyor, costmap 1 Hz'de => obstacle 25 cm geç fark ediliyordu.
      # 5.0 Hz'e cikarildi: her tickte 5 cm hareket, gercek-zamanli engel
      # algilama. Bu olmadan robot fizikselt engele carpti (Gazebo screenshot).
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.25
      resolution: 0.05
      # rolling_window: true -> costmap robot etrafinda 40m'lik pencere,
      # slam haritasi ufku otesine de plan yapabilir. slam_toolbox haritasi
      # static_layer'a yine yansir, ama costmap boyutu bilinmeyen alana da uzanir.
      # 40m pencere: robot (0,0)'da iken x in [-20, +20], y in [-20, +20].
      # ABORTED 102 (GOAL_OUTSIDE_MAP) hatasini onler (20m parkurda).
      rolling_window: true
      width: 40
      height: 40
      # PORT (articubot_one/plucky): track_unknown_space false -> TRUE.
      # Bilinmeyen hucreler FREE sayilinca Nav2 'ABORTED 102 GOAL_OUTSIDE_MAP'
      # false alarm veriyordu — kayan pencere kenarinda bos hucreler 'gercek
      # bilinmiyor' degil 'serbest' isaretlendiginden goal validation fail
      # ediyordu. TRUE yapinca planner unknown -> caution gradient olusturur,
      # SLAM haritasi yayildikca dogal serbest alan kazanilir.
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "terrain_layer", "detection_layer", "inflation_layer"]
      # Keepout filter shu an kullanilmiyor (maps/keepout_mask.* dosyalari yok).
      # 'filters' parametresi tamamen kaldirildi — empty liste planner_server'i
      # InvalidParameterValueException ile CRASH ettiriyordu.
      # Aktive etmek icin (gelecek):
      #   1) ika_navigation/maps/keepout_mask.{yaml,pgm} olusturun
      #   2) asagiya: filters: ["keepout_filter"]
      #   3) costmap_filters_info_server lifecycle node'unu calistirin

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan depth_points
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 6.0
          obstacle_min_range: 0.0
        depth_points:
          topic: /oak/points
          max_obstacle_height: 2.0
          min_obstacle_height: 0.05
          clearing: true
          marking: true
          data_type: "PointCloud2"
          raytrace_max_range: 4.0
          obstacle_max_range: 3.5

      # terrain_layer: ika_terrain node'unun /terrain_obstacles yayinini
      # ikinci bir StaticLayer olarak global costmap'e ekler.
      # NOT: nav2_costmap_2d::CostmapLayer base class - dogrudan
      # kullanilamaz. StaticLayer ile /terrain_obstacles topic'i tuketilir.
      terrain_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: /terrain_obstacles
        map_subscribe_transient_local: false
        subscribe_to_updates: false
        transform_tolerance: 0.5

      # detection_layer: ika_fusion node'unun /detection_obstacles yayinini
      # (DL ile tespit edilen dinamik/statik nesneler) StaticLayer olarak
      # costmap'e ekler - lidarin goremeyecegi (2D scan duzlemi ustundeki)
      # insan govdesi gibi engelleri yakalar. terrain_layer ile ayni kalip.
      detection_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: /detection_obstacles
        map_subscribe_transient_local: false
        subscribe_to_updates: false
        transform_tolerance: 0.5

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # KRITIK FIX (2026-06-04): inflation_radius 0.40 -> 0.55. Robot
        # carpmasi sebebiyle Plucky'nin daha agresif degeri (0.55) kullanildi.
        # Robot kenarindan 30 cm tampon (radius 0.25 + 0.30).
        # cost_scaling 2.58 yumusak gradient (Plucky standardi).
        cost_scaling_factor: 2.58
        inflation_radius: 0.55

      # KeepoutFilter VARSAYILAN OLARAK KAPALI - aktiflestirmek icin
      # KEEPOUT.md rehberini takip edin (mask dosyasi + filter_info_server
      # node'unu launch icine ekleyin, sonra burada enabled: true yapin).
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: false
        filter_info_topic: "/costmap_filter_info"

# Keepout zone icin gereken yardimci node'lar.
# Aktiflestirmek icin: ika_navigation/launch/navigation.launch.py icine
# bu node'lari ekle ve lifecycle_manager_navigation listesine dahil et.
filter_mask_server:
  ros__parameters:
    use_sim_time: false
    frame_id: "map"
    topic_name: "/keepout_filter_mask"
    # Maske dosyasi - kullanici saglar (bkz. KEEPOUT.md)
    yaml_filename: "keepout_mask.yaml"

costmap_filter_info_server:
  ros__parameters:
    use_sim_time: false
    type: 0                       # 0 = KeepoutFilter
    filter_info_topic: "/costmap_filter_info"
    mask_topic: "/keepout_filter_mask"
    base: 0.0
    multiplier: 1.0

local_costmap:
  local_costmap:
    ros__parameters:
      # KRITIK FIX (2026-06-05): bkz. global_costmap.use_sim_time aciklamasi.
      # SIM'DE true OLMALI; Pi'de false.
      use_sim_time: true
      # transform_tolerance: bkz. global_costmap aciklamasi. WSL'de /scan
      # mesaj filtresinin DROP etmesini onler.
      transform_tolerance: 2.0
      # FIX (2026-06-04): publish_frequency 2 -> 5 Hz (DWB ile uyum).
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      robot_radius: 0.25
      plugins: ["voxel_layer", "terrain_layer", "detection_layer", "inflation_layer"]

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan depth_points
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          obstacle_max_range: 5.5
        depth_points:
          topic: /oak/points
          max_obstacle_height: 2.0
          min_obstacle_height: 0.02
          clearing: true
          marking: true
          data_type: "PointCloud2"
          raytrace_max_range: 3.0
          obstacle_max_range: 2.5

      terrain_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: /terrain_obstacles
        map_subscribe_transient_local: false
        subscribe_to_updates: false
        transform_tolerance: 0.5

      detection_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: /detection_obstacles
        map_subscribe_transient_local: false
        subscribe_to_updates: false
        transform_tolerance: 0.5

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # KRITIK FIX (2026-06-04): inflation_radius 0.40 -> 0.55. Robot
        # carpmasi sebebiyle Plucky'nin daha agresif degeri (0.55) kullanildi.
        # Robot kenarindan 30 cm tampon (radius 0.25 + 0.30).
        # cost_scaling 2.58 yumusak gradient (Plucky standardi).
        cost_scaling_factor: 2.58
        inflation_radius: 0.55

collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: base_link
    odom_frame_id: odom
    cmd_vel_in_topic: /cmd_vel_nav
    cmd_vel_out_topic: /cmd_vel_collision
    state_topic: /collision_monitor_state
    transform_tolerance: 0.5
    source_timeout: 2.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    # KRITIK (2026-06-04): 3 katmanli savunma:
    # 1) StopZone (40 cm)   -> ANINDA durdur (engele <40cm lidar nokta)
    # 2) SlowDown (60 cm)   -> %30 hiza dus (engele yaklasiyor)
    # 3) ApproachBox        -> dinamik time-to-collision (DWB ile uyumlu)
    # FIX 2 (2026-06-04): Circle StopZone => 360° lidar verisi sahne
    # objelerini hayalet engel sayip robot hic hareket edemiyordu.
    # Forward-only polygonlar: SADECE ILERIDEKI engel tetikler.
    polygons: ["StopZoneFront", "SlowDownZoneFront"]
    StopZoneFront:
      type: polygon
      # Robot ONUNDE 30 cm derinligi, +/-25 cm genisligi.
      # Lidar bu kutuda >=3 nokta gorurse ANINDA STOP.
      # base_link x>0 ON YON, lidar laser_frame robotun ortasinda (x=0.05).
      points: "[[0.30, 0.25], [0.30, -0.25], [0.10, -0.25], [0.10, 0.25]]"
      action_type: stop
      min_points: 3
      visualize: true
      polygon_pub_topic: /collision_poly_stop
    SlowDownZoneFront:
      type: polygon
      # Onunde 60 cm derinligi, +/- 30 cm. %30 hiza dus.
      points: "[[0.60, 0.30], [0.60, -0.30], [0.30, -0.30], [0.30, 0.30]]"
      action_type: slowdown
      min_points: 3
      slowdown_ratio: 0.30
      visualize: true
      polygon_pub_topic: /collision_poly_slow
    # SADECE LIDAR (depth_pointcloud kaldirildi — sim'de gec spawn lifecycle
    # configure failure yapiyordu; lidar zaten 2D engel algilama icin yeterli).
    observation_sources: ["scan"]
    scan:
      type: scan
      topic: /scan

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 4.0
    attempt_respawn_reconnection: true
    bond_respawn_max_duration: 10.0
    node_names:
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator
      - collision_monitor

lifecycle_manager_ika:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - terrain_perception
      - safety_supervisor
