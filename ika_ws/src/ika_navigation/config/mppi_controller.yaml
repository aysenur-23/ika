# MPPI yerel planlayici overlay'i (Nav2 nav2_mppi_controller).
#
# Tez kapsami: klasik DWB'ye karsi ornekleme/optimizasyon tabanli MPPI
# karsilastirmasi (sim'de). Bu dosya nav2_params.yaml UZERINE yuklenir
# (navigation.launch.py local_planner:=mppi); yalniz controller_server'in
# FollowPath bloğunu DWB -> MPPI olarak ezer. Diger her sey nav2_params'tan
# gelir. critics + plugin anahtarlari burada ezildigi icin DWB artigi
# parametreler MPPI'yi etkilemez.
#
# Hizlar nav2_params DWB ile ayni sinirda tutuldu (max 0.25 m/s, skid-steer
# ~ DiffDrive). Engelden kacinma CostCritic ile local costmap'ten okunur -
# yani terrain_layer + detection_layer dogrudan MPPI'yi besler.
controller_server:
  ros__parameters:
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      # FIX (2026-06-05): controller_frequency 5 Hz (Plucky port) => period 0.2s.
      # MPPI "Controller period more then model dt" hatasi -> model_dt = 0.2.
      model_dt: 0.2
      batch_size: 2000
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.4
      vx_max: 0.25
      vx_min: -0.15
      vy_max: 0.0
      wz_max: 0.8
      ax_max: 1.5
      ax_min: -1.5
      ay_max: 1.0
      az_max: 2.0
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 1.0   # WSL TF cache uyumsuzlugu icin (DWB ile ayni mantik)
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: false
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstraints:
        min_turning_r: 0.0
      critics:
        - "ConstraintCritic"
        - "CostCritic"
        - "GoalCritic"
        - "GoalAngleCritic"
        - "PathAlignCritic"
        - "PathFollowCritic"
        - "PathAngleCritic"
        - "PreferForwardCritic"
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.0
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: false  # local_costmap robot_radius (sefr footprint) kullaniyor
        collision_cost: 1000000.0
        near_goal_distance: 1.0
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0
